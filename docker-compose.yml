version: '3.8'

services:
  react-frontend:
    image: wjd5107/react-frontend:latest
    container_name: react-frontend
    ports:
      - "80:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://deepground-server:8080/api/v1
    depends_on:
      - deepground-server

  deepground-server:
    image: wjd5107/deepground-server:latest
    container_name: deepground-server
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/deepground
      - REDIS_HOST=redis  # Redis 서비스 이름으로 설정
      - REDIS_PORT=6379
    depends_on:
      - mongodb
      - redis # Redis 의존성 추가

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # Redis 서비스 추가
  redis:
    image: redis:latest
    container_name: deepground-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data: