name: Deploy
on:
  push:
    branches: [ "develop"]

  workflow_dispatch:

permissions:
  contents: read

env:
  working-directory: .

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
       # GitHub 저장소 코드 내려받기
      - name: Checkout Repository
        uses: actions/checkout@v3
        # JDK version 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
        # Gradle caching - 빌드 시간 향상
      - name: Gradle Caching
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
             ${{ runner.os }}-gradle-
        # Gradle로 프로젝트 빌드
      - name: Build with Gradle
        run: ./gradlew build -x test
      - name: application.yml 생성
        working-directory: ${{ env.working-directory }}
        run: |
          mkdir -p ./src/main/resources
          echo "${{ secrets.STAGING_YML }}" | base64 -d > ./src/main/resources/application.yml
          cat ./src/main/resources/application.yml
        # Docker 빌드를 위한 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
        # Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: .env 파일 생성
        run: |
          echo "${{ secrets.ENV }}" | base64 -d > .env
        #  Docker 이미지 빌드 + 푸시
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }}:${{ github.ref_name }}
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY }}:latest
          labels: version=${{ github.ref_name }}
        # EC2에 배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          envs: ENV_FILE=/home/ubuntu/deepground/.env
          script: |
              cd /home/ubuntu/deepground
              
              # .env 파일 생성
              echo "${{ secrets.ENV }}" | base64 -d > .env
              chmod 600 .env
              
              # Docker 로그인 정보 환경 변수 설정
              export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
              export DOCKER_PASSWORD=${{ secrets.DOCKER_PASSWORD }}
              
              # deploy.sh 실행
              ./deploy.sh
              
              # 보안을 위해 .env 파일 삭제
              rm .env
